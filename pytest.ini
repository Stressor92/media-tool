[pytest]
# Pytest configuration for media-tool unit tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Markers for test organization
markers =
    unit: Unit tests for core and utility modules
    integration: Integration tests combining multiple modules
    external: Tests that touch external services or network APIs and require opt-in
    live_integration: Integration tests that require live services, external downloads, or manual opt-in
    slow: Tests that take longer to execute
    mock: Tests using mocking for ffmpeg/external calls
    safety: Tests verifying error handling and edge cases

# Coverage options (if using pytest-cov)
addopts =
    -v
    --strict-markers
    --disable-warnings

# Doctest configuration
doctest_optionflags = NORMALIZE_WHITESPACE ELLIPSIS

# Timeout for tests (if using pytest-timeout)
# timeout = 30
