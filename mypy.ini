[mypy]
python_version = 3.11
files = src, tests
mypy_path = src
namespace_packages = True
explicit_package_bases = True
strict_optional = True
warn_unused_ignores = True
disallow_untyped_defs = True
no_implicit_optional = True
check_untyped_defs = True
show_error_codes = True
warn_unused_configs = True
# When running `python -m mypy .`, mypy otherwise discovers `src/*` both by file path
# and by import name, which duplicates mixed imports such as `core.*` and `src.statistics.*`.
exclude = ^(htmlcov[\\/]|src[\\/].*|tests[\\/].*\.tmp$)

[mypy-tests.*]
disallow_untyped_defs = False
check_untyped_defs = False

[mypy-acoustid]
ignore_missing_imports = True

[mypy-musicbrainzngs]
ignore_missing_imports = True

[mypy-faster_whisper]
ignore_missing_imports = True

[mypy-whisper]
ignore_missing_imports = True

[mypy-mutagen]
ignore_missing_imports = True

[mypy-mutagen.*]
ignore_missing_imports = True

[mypy-yt_dlp]
ignore_missing_imports = True

[mypy-yt_dlp.*]
ignore_missing_imports = True

[mypy-core.download.*]
disallow_untyped_defs = True
disallow_any_generics = True
warn_return_any = True

[mypy-ctranslate2]
ignore_missing_imports = True

[mypy-ctranslate2.*]
ignore_missing_imports = True

[mypy-transformers]
ignore_missing_imports = True

[mypy-transformers.*]
ignore_missing_imports = True

[mypy-sentencepiece]
ignore_missing_imports = True

[mypy-sentencepiece.*]
ignore_missing_imports = True

[mypy-argostranslate]
ignore_missing_imports = True

[mypy-argostranslate.*]
ignore_missing_imports = True

[mypy-langdetect]
ignore_missing_imports = True

[mypy-langdetect.*]
ignore_missing_imports = True