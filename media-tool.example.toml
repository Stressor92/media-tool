# Copy this file to media-tool.toml and fill in your local values.
# The real media-tool.toml file is ignored by Git.

[api]
opensubtitles_api_key = ""
acoustid_api_key = ""
opensubtitles_user_agent = "media-tool v1.0"

[tools]
ffmpeg = "ffmpeg"
ffprobe = "ffprobe"
yt_dlp = "yt-dlp"

[paths]
library_root = ""
incoming_root = ""
temp_dir = ""

[defaults.subtitles]
languages = ["en"]
embed = true
auto = true

[defaults.audio]
min_confidence = 0.7

[download]
default_output_video = "downloads/videos"
default_output_music = "downloads/music"
default_output_series = "downloads/series"
max_resolution = 1080
audio_format = "mp3"
audio_quality = "320k"
preferred_language = "de"
subtitle_languages = ["de", "en"]
embed_subtitles = true
embed_thumbnail = true
sponsorblock_remove = ["sponsor"]

# yt-dlp is used by the Python download subsystem.
# Keep [tools].yt_dlp aligned with your shell setup for manual usage or legacy scripts.

[workflow.movies]
stop_on_failure          = true
dvd_upscale_profile      = "dvd-hq"
bluray_crf               = 18
bluray_preset            = "slow"
subtitle_languages       = ["de", "en"]
subtitle_fallback_whisper = false   # true sobald Whisper integriert
organize_naming          = "jellyfin"  # jellyfin | flat

[workflow.movies.skip_steps]
# Einzelne Steps deaktivieren (z. B. im NAS-Nachtlauf):
# merge_language_dupes = true
# mp4_to_mkv           = true
# upscale_dvd          = true
# encode_bluray        = true
# subtitles            = true
# organize             = true

[translation]
# Offline subtitle translation (no cloud, no API key required)
# Install GPU backend:  pip install ctranslate2 transformers sentencepiece
# Install CPU fallback: pip install argostranslate
# Install lang-detect:  pip install langdetect
backend    = "opus-mt"   # "opus-mt" (GPU, recommended) | "argos" (CPU fallback)
model_size = "big"       # "standard" (~300 MB, BLEU ~35) | "big" (~900 MB, BLEU ~44, empfohlen)
                         #   en→de big: gsarti/opus-mt-tc-big-en-de
                         #   de→en big: same as standard (no tc-big variant exists)
device     = "auto"      # "auto" | "cuda" | "cpu"
batch_size = 32

# Context-aware chunking
chunk_size        = 4    # segments per translation chunk (more = better grammar)
max_chars_per_chunk = 250

# Tag preservation (HTML <i> <b> and ASS {\an8} tags)
preserve_tags = true

# Post-translation line wrapping
line_wrap       = true
max_line_length = 40
max_lines       = 2

# Auto language detection (requires: pip install langdetect)
auto_detect_language = false

# Optional: use in-memory translation cache (avoids re-translating repeated lines)
use_cache = true

# Custom local model cache (default: src/utils/translate_models — populated by 'media-tool subtitle download-models')
# model_cache_dir = "D:\\models\\translation"