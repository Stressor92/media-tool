# Copy this file to media-tool.toml and fill in your local values.
# The real media-tool.toml file is ignored by Git.

[api]
opensubtitles_api_key = ""
acoustid_api_key = ""
tmdb_api_key = ""
googlebooks_api_key = ""
# Kostenlos unter: https://www.themoviedb.org/settings/api
opensubtitles_user_agent = "media-tool v1.0"

[tools]
ffmpeg = "ffmpeg"
ffprobe = "ffprobe"
yt_dlp = "yt-dlp"

[paths]
library_root = ""
incoming_root = ""
temp_dir = ""

[defaults.subtitles]
languages = ["en"]
embed = true
auto = true

[defaults.audio]
min_confidence = 0.7

[download]
default_output_video = "downloads/videos"
default_output_music = "downloads/music"
default_output_series = "downloads/series"
max_resolution = 1080
audio_format = "mp3"
audio_quality = "320k"
preferred_language = "de"
subtitle_languages = ["de", "en"]
embed_subtitles = true
embed_thumbnail = true
sponsorblock_remove = ["sponsor"]

# ---------------------------------------------------------------------------
# Hardware Encoder Configuration (H.265 Upscaling)
# Automatic detection of available GPU encoders (NVENC, AMF, QSV)
# ---------------------------------------------------------------------------
[upscale]
# "auto" = use best available hardware, or "nvenc", "amf", "qsv", "software"
encoder = "auto"

# Automatically retry with software encoding if hardware encoding fails
hw_fallback_on_error = true

# NVENC-specific tuning
nvenc_max_vram_mb = 0          # 0 = unlimited; consumer GPUs: ~11GB (RTX 3080)
nvenc_max_sessions = 2         # Consumer GPUs allow max 3 sessions; use 2 to stay safe

# Encoder probe timeout (seconds)
hw_probe_timeout_sec = 10

[ebook]
preferred_format = "epub"
download_cover = true
metadata_providers = ["openlibrary", "googlebooks"]

# Optional: set [api].googlebooks_api_key for higher Google Books quota.

[ebook.organization]
structure = "{author}/{series}/{title}"

[ebook.conversion]
target_format = "epub"

# yt-dlp is used by the Python download subsystem.
# Keep [tools].yt_dlp aligned with your shell setup for manual usage or legacy scripts.

[workflow.movies]
stop_on_failure          = true
dvd_upscale_profile      = "dvd-hq"
bluray_crf               = 18
bluray_preset            = "slow"
subtitle_languages       = ["de", "en"]
subtitle_fallback_whisper = false   # true sobald Whisper integriert
organize_naming          = "jellyfin"  # jellyfin | flat

[workflow.movies.skip_steps]
# Einzelne Steps deaktivieren (z. B. im NAS-Nachtlauf):
# merge_language_dupes = true
# mp4_to_mkv           = true
# upscale_dvd          = true
# encode_bluray        = true
# subtitles            = true
# organize             = true

[translation]
# Offline subtitle translation (no cloud, no API key required)
# Install GPU backend:  pip install ctranslate2 transformers sentencepiece
# Install CPU fallback: pip install argostranslate
# Install lang-detect:  pip install langdetect
backend    = "opus-mt"   # "opus-mt" (GPU, recommended) | "argos" (CPU fallback)
model_size = "big"       # "standard" (~300 MB, BLEU ~35) | "big" (~900 MB, BLEU ~44, empfohlen)
                         #   en→de big: gsarti/opus-mt-tc-big-en-de
                         #   de→en big: same as standard (no tc-big variant exists)
device     = "auto"      # "auto" | "cuda" | "cpu"
batch_size = 32

# Context-aware chunking
chunk_size        = 4    # segments per translation chunk (more = better grammar)
max_chars_per_chunk = 250

# Tag preservation (HTML <i> <b> and ASS {\an8} tags)
preserve_tags = true

# Post-translation line wrapping
line_wrap       = true
max_line_length = 40
max_lines       = 2

# Auto language detection (requires: pip install langdetect)
auto_detect_language = false

# Optional: use in-memory translation cache (avoids re-translating repeated lines)
use_cache = true

# Custom local model cache (default: src/utils/translate_models — populated by 'media-tool subtitle download-models')
# model_cache_dir = "D:\\models\\translation"

[jellyfin]
base_url = "http://192.168.1.100:8096"   # or https://
api_key  = ""                             # Dashboard → Advanced → API Keys
wait_for_scan = false                     # Block until scan finishes after refresh
scan_timeout  = 300                       # Seconds

[jellyfin.auto_trigger]
enabled          = true    # Automatically refresh after a successful workflow
on_success_only  = true    # Only trigger on successful workflow completion

[jellyfin.inspect]
check_missing_poster   = true
check_missing_overview = true
check_missing_year     = true
check_unmatched        = true
check_duplicates       = true
check_series_matching  = true

# ---------------------------------------------------------------------------
# Automatische Audio-Spracherkennung (A04 Audit-Fix)
# Erkennt unlabeled Audio-Tracks (und/leer) und schreibt das ISO 639-2 Kürzel
# via FFmpeg Remux — kein Re-Encoding.
# Stufen: Heuristik (< 1ms) → Whisper (2–30s)
# ---------------------------------------------------------------------------
[language_detection]
min_confidence  = 0.85       # Schwellwert für Akzeptanz (0.0–1.0)
whisper_model   = "medium"   # "tiny" | "base" | "medium" | "large-v3"
device          = "auto"     # "auto" | "cuda" | "cpu"
sample_duration = 30         # Sekunden Audio für Whisper
sample_offset   = 120        # Sekunden vom Anfang überspringen (Intro)
create_backup   = false      # Backup (.bak) vor In-Place-Schreiben

# Hint-Sprachen beschleunigen Whisper (Suchraum einschränken)
hint_languages  = ["de", "en"]

[metadata]
language = "de-DE"
fallback_language = "en-US"
preferred_artwork_lang = "de"
auto_select = true
overwrite_nfo = false
overwrite_artwork = false

[metadata.artwork]
download_poster = true
download_fanart = true
download_banner = false
download_thumb = false
download_logo = false

[metadata.cast]
max_actors = 20

[statistics]
# Directory for stats.json
# Default: ~/.media-tool/
data_dir = ""

# Maximum number of history entries (days)
history_max_days = 365

# Disable statistics collection (e.g. in CI/tests)
enabled = true